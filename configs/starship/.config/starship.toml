# ~/.config/starship.toml

add_newline = false
format = "$hostname$directory($git_branch )($git_status )$character"

[hostname]
ssh_only = true
style = "bold red"
format = "[ ssh:$hostname ]($style) "

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold blue"
format = "[$path]($style) "

[git_branch]
symbol = ""
style = "bold green"
format = "[\\($branch\\)]($style)"

[git_status]
style = "bold yellow"
format = "[$all_status$ahead_behind]($style)"

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"
