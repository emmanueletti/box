# ─────────────────────────────────────────────────────────
# General
# ─────────────────────────────────────────────────────────
set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on

# Index windows/panes from 1, renumber on close
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Vi keys in copy mode
setw -g mode-keys vi


# ─────────────────────────────────────────────────────────
# Keybinds
# ─────────────────────────────────────────────────────────
# Reload config (the tmux killer feature)
bind r source-file ~/.config/tmux/tmux.conf

# Splits keep current path (both | / - and the defaults % / " work)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ─────────────────────────────────────────────────────────
# Status bar (minimal, hand-styled)
# ─────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=default fg=white"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=blue,bold] #S #{?client_prefix,#[bg=yellow#,fg=black#,bold] PREFIX #[default],}#[fg=white,dim]│ "
set -g status-right "#[fg=blue]%a %d %b · %H:%M "

setw -g window-status-format "#[fg=white,dim] #I #W "
setw -g window-status-current-format "#[bg=blue,fg=black,bold] #I #W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "#{?client_prefix,fg=yellow#,bold,fg=blue}"

# Message line
set -g message-style "bg=default fg=blue"

# ─────────────────────────────────────────────────────────
# Plugins (TPM)
# ─────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-restore last session on tmux start
set -g @continuum-restore 'on'

# Tell TPM where to install plugins (XDG-friendly for dotfiles)
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

# Initialize TPM (keep this at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'
